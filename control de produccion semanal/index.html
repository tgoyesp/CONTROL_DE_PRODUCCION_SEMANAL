<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de producción</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th colspan="2">Control de Producción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dimension Dias</td>
                <td>
                    <select id="id-select-dias">
                        <option value="5" selected>5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button id="id-btn-cargar-produccion">Cargar Producción</button>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="id-btn-presentar-produccion">Presentar</button>
                </td>
                <td>
                    <textarea name="" id="id-listado-produccion" rows="3" readonly>
                    </textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="btn-calcular-total">Calcular total</button>
                </td>
                <td>
                    <input id="id-txt-total" readonly placeholder="0">
                </td>
            </tr>
            <tr>
                <td>
                    <button id="btn-mayor-produccion">Mayor produccion</button>
                </td>
                <td>
                    <input type="text" placeholder="0" readonly id="id-txt-mayor-produccion">
                </td>
            </tr>
            <tr>
                <td>
                    <button id="btn-menor-produccion">Menor produccion</button>
                </td>
                <td>
                    <input type="text" readonly placeholder="0" id="id-txt-menor-produccion">
                </td>
            </tr>
            <tr>
                <td>
                    <button id="btn-calcular-promedio">Promedio</button>
                </td>
                <td>
                    <input type="number" readonly placeholder="0" id="id-txt-promedio">
                </td>
            </tr>
            <tr>
                <td align="center" colspan="2">
                    <button id="btn-arriba-promedio">Dias arriba de Promedio</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <textarea id="id-txt-arriba-promedio" cols="40" rows="5" readonly></textarea>
                </td>
            </tr>
            <tr>
                <td align="center" colspan="2">
                    <button id="btn-critico">Dias criticos</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <textarea id="id-txt-critico" readonly cols="40" rows="5"></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button id="btn-produccion-repetida">Produccion repetida</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <textarea id="id-txt-repetida" readonly cols="40" rows="5"></textarea>
                </td>
            </tr>
        </tbody>
        <tfoot></tfoot>
    </table>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
